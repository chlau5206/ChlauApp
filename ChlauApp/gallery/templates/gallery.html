{% extends 'layout.html' %}

{% block content %}

<section class="section">
    <div class="container">

        <h1 class="title">Photo Gallery</h1>

        <a href="{{ url_for('gallery_bp.upload') }}" class="button is-primary">Upload Photo</a>

        <div class="columns is-multiline">
            {% for photo in photos %}
            <div class="column is-one-third">
                <div class="card">
                    <div class="card-image">
                        <figure class="image is-4by3">
                            <img src="{{ url_for('static', filename='uploads/' + photo.filename) }}" alt="{{ photo.title }}">
                        </figure>
                    </div>
                    <div class="card-content">
                        <p class="title is-4">{{ photo.title }}</p>
                        <p class="subtitle is-6">{{ photo.description }}</p>
                        <form action="{{ url_for('gallery_bp.delete', photo_id=photo.id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this photo?');">
                            {{ delete_form.hidden_tag() }}
                            {{ delete_form.submit(class="button is-danger is-small") }}
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>


    </div>
</section>

        {% endblock %}
