{% extends "layout.html" %}
{% block title %}
Student
{% endblock %}
{% block content %}


<div class="container mt-5">
    <h1 class="text-center">Students Data</h1>

    <!-- Form to Add a New Student -->
    <form method="POST" action="{{ url_for('students_bp.add_student') }}">
        <div class="form-row">
            <div class="form-group col-md-3">
                <input type="text" class="form-control" name="name" placeholder="Name" required>
            </div>
            <div class="form-group col-md-3">
                <input type="text" class="form-control" name="course" placeholder="Course" required>
            </div>
            <div class="form-group col-md-3">
                <input type="text" class="form-control" name="grade" placeholder="Grade" required>
            </div>
            <div class="form-group col-md-3">
                <button type="submit" class="btn btn-primary">Add Student</button>
            </div>
        </div>
    </form>

    <!-- Table to Display Students -->
    <table class="table table-striped mt-5">
        <thead>
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Grade</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.course }}</td>
                <td>{{ student.grade }}</td>
                <td>
                    <!-- Form to Update a Student -->
                    <form method="POST" action="{{ url_for('students_bp.update_student', id=student.id) }}" style="display:inline;">
                        <input type="text" name="name" placeholder="Name" value="{{ student.name }}" required>
                        <input type="text" name="course" placeholder="Course" value="{{ student.course }}" required>
                        <input type="text" name="grade" placeholder="Grade" value="{{ student.grade }}" required>
                        <button type="submit" class="btn btn-warning">Update</button>
                    </form>

                    <!-- Form to Delete a Student -->
                    <form method="POST" action="{{ url_for('students_bp.delete_student', id=student.id) }}" style="display:inline;">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
