{% extends "layout.html" %}
{% block title %}
Student
{% endblock %}
{% block content %}

<div class="container mt-5">
    <h1 class="text-center">Students Data</h1>

    <table class="table table-striped mt-5">
        <thead>
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Grade</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.course }}</td>
                <td>{{ student.grade }}</td>
                <td>
                    <!-- Link to Update Student -->
                    <a href="{{ url_for('students_bp.update_student', id=student.id) }}" class="btn btn-warning">Update</a>

                    <!-- Form to Delete a Student -->
                    <form method="POST" action="{{ url_for('students_bp.delete_student', id=student.id) }}" style="display:inline;">
                        {{ form.hidden_tag() }}  <!-- Add CSRF token -->
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Link to Add Student -->
    <a href="{{ url_for('students_bp.add_student') }}" class="btn btn-primary">Add Student</a>
</div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

{% endblock %}
