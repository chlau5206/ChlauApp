{% extends "layout.html" %}

{% block title %}
Member Register - {{ title }}
{% endblock %}
{% block content %}
<h1>Register {{ title }}</h1>
<br />

<form method="post" action={{ action_url }}>
    {{ form.hidden_tag() }}
    {{ form.username.label }} {{ form.username() }}<br>
    {{ form.password.label }} {{ form.password() }}<br>
    {{ form.submit() }}<br />
</form>
{% endblock %}
