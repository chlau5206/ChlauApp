{% extends "layout.html" %}

{% block header %}
<title>
    {%if title %}
    {{ title }}
    {% endif %}
    ChLau App
</title>
{% endblock %}


{% block content %}
<div class="container mt-5">
    <h1 class="text-center">Membership</h1>
    <section class="section">
        <div class="container mt-5">

            <table class="table is-striped is-hoverable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.username }}</td>
                        <td>{{ user.role }}</td>
                        <td>
                            <!-- Link to Update user info -->
                            <a href="{{ url_for('auth_bp.update_user', id=user.id) }}" class="button is-warning">Update</a>

                            <!-- Form to Delete a user -->
                            <form method="POST" action="{{ url_for('auth_bp.remove_user', id=user.id) }}" style="display:inline;">
                                {{ form.hidden_tag() }}  <!-- Add CSRF token -->
                                <button type="submit" class="button is-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <!-- Link to Add user -->
            <a href="{{ url_for('auth_bp.register_user') }}" class="button is-primary">Add new member</a>
        </div>
    </section>
</div>


{% endblock %}
