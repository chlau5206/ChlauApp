{% extends "layout.html" %}

{% block header %}
<link rel="stylesheet" type="text/css" href="{{ url_for('auth_bp.static', filename='css/style.css')}}" />
{% endblock %}


{% block content %}
<h2 class="text-center">Membership</h2>
<div class="container mt-5">

    <table class="table is-striped is-hoverable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.username }}</td>
                <td>{{ user.role }}</td>
                <td style="text-align: center; vertical-align: top;">
                    <!-- Link to Update user info -->
                    <a href="{{ url_for('auth_bp.update_user', id=user.id) }}" class="button is-warning">Update</a>
                    <!-- Form to Delete a user -->
                    <form method="POST" action="{{ url_for('auth_bp.remove_user', id=user.id) }}" style="display:inline-block;">
                        {{ form.hidden_tag() }}  <!-- Add CSRF token -->
                        <button type="submit" class="button is-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Link to Add user -->
    <a href="{{ url_for('auth_bp.register_user') }}" class="button is-link">Add new member</a>
</div>
{% endblock %}
