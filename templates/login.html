{% extends "layout.html" %}
{% block title %}
Member login page 
{% endblock %}
{% block content %}
<h1>Login to your account</h1><br />

<form method="post" action={{ action_url }}>
    {{ form.hidden_tag() }}
    {{ form.username.label }} {{ form.username() }}<br>
    {{ form.password.label }} {{ form.password() }}<br>
    {{ form.submit() }}
</form>


{% endblock %}
